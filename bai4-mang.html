<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<!--In ra:
Số lượng học viên trong lớp.
Tổng điểm và điểm trung bình của cả lớp.
Điểm cao nhất và điểm thấp nhất.
Số học viên đạt (điểm >= 5).
-->
<script>
    let diemLop = [7, 9, 4, 8, 6, 10, 3, 5];
    let number = diemLop.length;
    console.log("Số lượng học viên trong lớp:", number)
    let total = 0;
    let diemTrungBinh = total / number;
    let max = diemLop[0];
    let min = diemLop[0];
    let soHocVienDat = 0;
    for (let i = 0; i < diemLop.length; i++) {
        let diemNhapVao = diemLop[i];
        total += diemNhapVao;
        if (diemNhapVao > max) {
            diemNhapVao = max;
        } if ( diemNhapVao < min) {
            diemNhapVao = min;
        } if ( diemNhapVao >= 5) {
            soHocVienDat++;
        }
    }
    console.log("Tổng điểm cả lớp:", total)
    console.log("Điểm trung bình của lớp:", diemTrungBinh)
    console.log("Điểm cao nhất lớp:", max)
    console.log("Điểm thấp nhất lớp:", min)
    console.log("Số học sinh đạt điểm >=5:", soHocVienDat)
</script>
</body>
</html>
